name: release

# Auto-publish @izagood/avcs to npm + cut a GitHub Release when a version bump
# lands on main (i.e. a PR that changes package.json#version is merged).
#
# To ship a release:
#   1. in a PR, bump "version" in package.json (e.g. 0.1.0 -> 0.1.1)
#   2. merge the PR into main
#
# The workflow runs on every push to main (post-merge only — PRs never push to
# main), and the publish steps are guarded so they run *only* when package.json's
# version is not yet on the registry. So a merge that doesn't change the version
# is a safe no-op, and — crucially — a *follow-up* code-only fix to a release that
# failed mid-flight will re-trigger the workflow and finish publishing the still-
# unpublished version, with no manual re-run needed. (We deliberately do NOT gate
# this on the CI workflow via `workflow_run`: that fires on PR CI too, which would
# risk publishing un-merged code.)
#
# Publishing requires an `NPM_TOKEN` repository secret (an npm automation token
# with publish rights to the @izagood scope). `npm publish` runs the
# `prepublishOnly` gate (typecheck + test + build), so a release can only ship
# green, freshly-built artifacts.

on:
  push:
    branches: [main]

# Never run two publishes at once.
concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write # create the git tag + GitHub Release
  id-token: write # npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need tags to create/push the release tag

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Check whether this version needs publishing
        id: check
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

          # Already on npm? Then this push didn't bump the version — nothing to do.
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::$NAME@$VERSION is already published — skipping release."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::$NAME@$VERSION is new — releasing."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "Publish to npm (runs prepublishOnly: typecheck, test, build)"
        if: steps.check.outputs.publish == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag the release commit
        if: steps.check.outputs.publish == 'true'
        run: |
          TAG="${{ steps.check.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.check.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.check.outputs.tag }}" --generate-notes --title "${{ steps.check.outputs.tag }}"
